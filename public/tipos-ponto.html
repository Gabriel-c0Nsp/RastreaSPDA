<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="description" content="Tipos de ponto de inspeção — RastreaSPDA">
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RastreaSPDA">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Tipos de Ponto — RastreaSPDA</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>Tipos de Ponto</h1>
  </header>

  <main class="page-content">
    <p style="font-size:.875rem;color:var(--text-muted);margin-bottom:1rem">
      Tipos globais de pontos de inspeção de SPDA. A sigla é usada no código do ponto.
    </p>

    <div class="card" id="list-container">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <button class="fab" id="btn-add" title="Novo tipo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Novo Tipo</h2>
        <button class="modal-close" id="btn-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="f-nome">Nome *</label>
          <input class="form-input" id="f-nome" type="text" required placeholder="Ex.: Captação Isolada, Condutor de Descida">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-sigla">Sigla *</label>
          <input class="form-input" id="f-sigla" type="text" required placeholder="Ex.: CI, CD" maxlength="6" style="text-transform:uppercase">
          <p class="form-hint">Sigla curta (máx. 6 caracteres)</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-descricao">Descrição</label>
          <textarea class="form-textarea" id="f-descricao" placeholder="Descrição do tipo de ponto…"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="app-nav"></div>
  <div class="toast-container" id="toast-container"></div>
  <script type="module" src="./js/tipos-ponto.js"></script>
  <script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));</script>
</body>
</html>
