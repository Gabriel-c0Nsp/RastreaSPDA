<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d4ed8">
  <title>Nova Inspeção — RastreaSPDA</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="app-header">
    <a href="#" class="header-btn" id="btn-back" title="Voltar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <h1 id="page-title">Nova Inspeção</h1>
  </header>

  <main class="page-content">
    <!-- Info do ponto -->
    <div class="card" id="ponto-info" style="margin-bottom:1rem">
      <div class="loading"><div class="spinner"></div></div>
    </div>

    <!-- Formulário de inspeção -->
    <form id="form-inspecao" novalidate>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Medições</span>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label" for="f-resistencia">Resistência de Aterramento</label>
            <div class="input-unit">
              <input class="form-input" id="f-resistencia" type="number" step="0.01" min="0" placeholder="0,00">
              <span class="unit-badge">Ω</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-continuidade">Continuidade</label>
            <div class="input-unit">
              <input class="form-input" id="f-continuidade" type="number" step="0.01" min="0" placeholder="0,00">
              <span class="unit-badge">mΩ</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top:.75rem">
        <div class="card-header">
          <span class="card-title">Condição Visual</span>
        </div>
        <div class="card-body">
          <div class="form-group" style="margin-bottom:.75rem">
            <select class="form-select" id="f-condicao-visual" required>
              <option value="">Selecione…</option>
              <option value="Boa">Boa</option>
              <option value="Regular">Regular</option>
              <option value="Ruim">Ruim</option>
              <option value="Crítica">Crítica</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:.25rem">
            <label class="form-check">
              <input type="checkbox" id="f-conforme">
              <span class="form-check-label">Ponto conforme</span>
            </label>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top:.75rem">
        <div class="card-header">
          <span class="card-title">Observações</span>
        </div>
        <div class="card-body">
          <textarea class="form-textarea" id="f-observacoes" placeholder="Observações, irregularidades, ações recomendadas…" rows="4"></textarea>
        </div>
      </div>

      <div style="margin-top:1.25rem;display:flex;gap:.75rem">
        <a href="#" class="btn btn-secondary btn-full" id="btn-cancel">Cancelar</a>
        <button type="submit" class="btn btn-primary btn-full" id="btn-submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><polyline points="20 6 9 17 4 12"/></svg>
          Registrar
        </button>
      </div>
    </form>
  </main>

  <div id="app-nav"></div>
  <div class="toast-container" id="toast-container"></div>
  <script type="module" src="./js/inspecoes.js"></script>
</body>
</html>
