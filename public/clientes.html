<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d4ed8">
  <title>Clientes — RastreaSPDA</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>Clientes</h1>
  </header>

  <main class="page-content">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="form-input search-input" id="search" type="search" placeholder="Buscar cliente…" autocomplete="off">
    </div>

    <div class="card" id="list-container">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- FAB -->
  <button class="fab" id="btn-add" title="Novo cliente">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Novo Cliente</h2>
        <button class="modal-close" id="btn-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="f-nome">Nome *</label>
          <input class="form-input" id="f-nome" type="text" required placeholder="Razão social ou nome">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-cnpj">CNPJ / CPF</label>
          <input class="form-input" id="f-cnpj" type="text" placeholder="00.000.000/0001-00">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-email">E-mail</label>
          <input class="form-input" id="f-email" type="email" placeholder="contato@empresa.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-telefone">Telefone</label>
          <input class="form-input" id="f-telefone" type="tel" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-endereco">Endereço</label>
          <input class="form-input" id="f-endereco" type="text" placeholder="Rua, número, cidade">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="app-nav"></div>
  <div class="toast-container" id="toast-container"></div>
  <script type="module" src="./js/clientes.js"></script>
</body>
</html>
