<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d4ed8">
  <title>Áreas — RastreaSPDA</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="app-header">
    <a href="clientes.html" class="header-btn" id="btn-back" title="Voltar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <h1 id="page-title">Áreas</h1>
  </header>

  <main class="page-content">
    <div class="filter-bar">
      <select class="form-select" id="filter-cliente">
        <option value="">Todos os clientes</option>
      </select>
    </div>

    <div class="card" id="list-container">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <button class="fab" id="btn-add" title="Nova área">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Nova Área</h2>
        <button class="modal-close" id="btn-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form" novalidate>
        <div class="form-group">
          <label class="form-label" for="f-cliente">Cliente *</label>
          <select class="form-select" id="f-cliente" required>
            <option value="">Selecione…</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-nome">Nome da Área *</label>
          <input class="form-input" id="f-nome" type="text" required placeholder="Ex.: Bloco A, Subestação 1">
        </div>
        <div class="form-group">
          <label class="form-label" for="f-sigla">Sigla *</label>
          <input class="form-input" id="f-sigla" type="text" required placeholder="Ex.: SB1" maxlength="8" style="text-transform:uppercase">
          <p class="form-hint">Usada na geração do código do ponto (máx. 8 caracteres)</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-descricao">Descrição</label>
          <textarea class="form-textarea" id="f-descricao" placeholder="Descrição opcional da área…"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="app-nav"></div>
  <div class="toast-container" id="toast-container"></div>
  <script type="module" src="./js/areas.js"></script>
</body>
</html>
